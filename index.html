<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evilasio Telefonia - Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --primary: #1e3a8a; --accent: #3b82f6; --success: #10b981; 
            --danger: #ef4444; --warning: #f59e0b; --dark: #0f172a; --light: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding-bottom: 80px; }
        .hidden { display: none !important; }

        /* Auth Screen */
        #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 16px; width: 350px; text-align: center; }

        /* Layout */
        .container { max-width: 1200px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; background: #e2e8f0; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Components */
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; padding: 10px 15px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }

        /* Badge Styles */
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; }
        .bg-7d { background: var(--success); }
        .bg-15d { background: var(--warning); }
        .bg-30d { background: var(--danger); }
        .update-alert { color: var(--danger); font-size: 11px; font-weight: bold; display: block; margin-top: 4px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 id="auth-title">Evilasio Telefonia</h2>
        <div id="auth-fields">
            <input type="text" id="user-name" class="hidden" placeholder="Nome Completo">
            <input type="tel" id="user-phone" class="hidden" placeholder="WhatsApp">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Senha">
            <button class="btn-main" style="width:100%" onclick="handleAuth()" id="btn-auth">Entrar</button>
            
            <div style="margin-top: 15px; font-size: 13px;">
                <span id="btn-switch" style="color: var(--accent); cursor:pointer" onclick="toggleAuthMode()">Criar conta</span> | 
                <span style="color: var(--danger); cursor:pointer" onclick="resetPassword()">Esqueci a senha</span>
            </div>
            <p id="login-error" style="color:var(--danger); font-size: 11px;"></p>
        </div>
    </div>
</div>

<div id="app" class="hidden">
    <div class="container">
        <div class="header" style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <h2 style="margin:0; color: var(--primary)">Sistema de Gestão</h2>
                <small>👤 <span id="display-name">...</span></small>
            </div>
            <button onclick="logout()" class="btn-outline" style="color:var(--danger); border-color:var(--danger)">Sair</button>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('estoque')">📦 Estoque</button>
            <button id="tab-users" class="tab-btn hidden" onclick="switchTab('usuarios')">👥 Usuários</button>
            <button id="tab-history" class="tab-btn hidden" onclick="switchTab('historico')">📜 Histórico</button>
        </div>

        <div id="content-estoque" class="tab-content">
            <input type="text" id="searchInput" class="search-box" style="font-size: 16px; margin-bottom: 15px;" placeholder="🔎 Pesquisar modelo ou fornecedor..." onkeyup="filterTable()">
            
            <div style="margin-bottom: 15px; display: flex; gap: 10px;">
                <button class="btn-main" style="background:var(--success)" onclick="toggleForm()">+ Nova Peça</button>
                <button class="btn-main" style="background:#8b5cf6" onclick="document.getElementById('importFile').click()">📥 Importar</button>
                <input type="file" id="importFile" class="hidden" onchange="importExcel(event)">
            </div>

            <div id="add-form" class="hidden" style="background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0;">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
                    <input type="date" id="new-data">
                    <input type="text" id="new-modelo" placeholder="Modelo">
                    <input type="text" id="new-fornecedor" placeholder="Fornecedor">
                    <input type="number" id="new-custo" placeholder="Custo R$">
                    <button class="btn-main" onclick="savePiece()">Salvar</button>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Data/Ref</th>
                            <th>Modelo / Fornecedor</th>
                            <th>Custo</th>
                            <th>Sugestão / Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="content-usuarios" class="tab-content hidden">
            <h3>Gestão de Acessos</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>WhatsApp</th>
                        <th>E-mail</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>

        <div id="content-historico" class="tab-content hidden">
            <h3>Histórico de Logins</h3>
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Usuário</th>
                        <th>E-mail</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3pXWX8z0d2B4Ydaz8V4BfkUOwTTB3a6s",
        authDomain: "consulta-pecas-88bef.firebaseapp.com",
        projectId: "consulta-pecas-88bef",
        storageBucket: "consulta-pecas-88bef.firebasestorage.app",
        messagingSenderId: "947197799357",
        appId: "1:947197799357:web:5276e85aea7ae93d5400d4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const ADM_EMAIL = "tvfmrp@gmail.com";
    let isLoginMode = true;
    let currentUserData = null;

    // --- AUTENTICAÇÃO ---

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Evilasio Telefonia" : "Criar Conta";
        document.getElementById('user-name').classList.toggle('hidden', isLoginMode);
        document.getElementById('user-phone').classList.toggle('hidden', isLoginMode);
        document.getElementById('btn-auth').innerText = isLoginMode ? "Entrar" : "Registrar";
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('login-error');

        if (isLoginMode) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => errorDiv.innerText = "Erro: " + e.message);
        } else {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            if(!name || !phone) return alert("Preencha nome e telefone!");
            
            auth.createUserWithEmailAndPassword(email, pass).then(u => {
                db.collection("usuarios").doc(u.user.uid).set({
                    nome: name, telefone: phone, email: email, autorizado: (email === ADM_EMAIL)
                });
            }).catch(e => errorDiv.innerText = e.message);
        }
    }

    function resetPassword() {
        const email = document.getElementById('email').value;
        if(!email) return alert("Digite seu e-mail no campo acima.");
        auth.sendPasswordResetEmail(email).then(() => {
            alert("E-mail de recuperação enviado! Verifique sua caixa de entrada e a pasta SPAM.");
        }).catch(e => alert(e.message));
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            db.collection("usuarios").doc(user.uid).get().then(doc => {
                currentUserData = doc.data();
                if(!currentUserData.autorizado && user.email !== ADM_EMAIL) {
                    alert("Aguarde a autorização do administrador.");
                    auth.signOut();
                    return;
                }
                
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('display-name').innerText = currentUserData.nome;

                if(user.email === ADM_EMAIL) {
                    document.getElementById('tab-users').classList.remove('hidden');
                    document.getElementById('tab-history').classList.remove('hidden');
                    loadUsers();
                    loadHistory();
                }

                // Registrar Histórico de Login
                db.collection("historico").add({
                    usuario: currentUserData.nome,
                    email: user.email,
                    data: new Date().toLocaleString('pt-BR')
                });

                loadData();
            });
        }
    });

    // --- CORE LOGIC ---

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('content-' + tab).classList.remove('hidden');
        event.currentTarget.classList.add('active');
    }

    function calculateDays(dateStr) {
        try {
            const parts = dateStr.split('/');
            const date = new Date(parts[2], parts[1]-1, parts[0]);
            const diff = Math.floor((new Date() - date) / (1000 * 60 * 60 * 24));
            return diff;
        } catch(e) { return 0; }
    }

    function loadData() {
        db.collection("pecas").orderBy("data", "desc").onSnapshot(snap => {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const item = doc.data();
                const dias = calculateDays(item.data);
                
                let badge = "";
                if(dias >= 30) badge = `<span class="badge bg-30d">30d+</span>`;
                else if(dias >= 15) badge = `<span class="badge bg-15d">15d+</span>`;
                else if(dias >= 7) badge = `<span class="badge bg-7d">7d+</span>`;

                const alertMsg = dias > 15 ? `<span class="update-alert">⚠️ Valor Desatualizado</span>` : '';
                const custo = parseFloat(item.custo) || 0;

                tbody.innerHTML += `
                    <tr>
                        <td>${item.data} ${badge}</td>
                        <td>
                            <strong>${item.modelo}</strong><br>
                            <small style="color:#64748b">Forn: ${item.fornecedor || 'N/A'}</small>
                        </td>
                        <td>R$ ${custo.toFixed(2)} ${alertMsg}</td>
                        <td>
                            <small>Sugerido: R$ ${(custo*2.5).toFixed(2)}</small><br>
                            <button onclick="deletePiece('${doc.id}')" style="color:red; font-size:10px; background:none; padding:0">Excluir</button>
                        </td>
                    </tr>`;
            });
        });
    }

    function savePiece() {
        const data = document.getElementById('new-data').value;
        const modelo = document.getElementById('new-modelo').value.toUpperCase();
        const fornecedor = document.getElementById('new-fornecedor').value.toUpperCase();
        const custo = document.getElementById('new-custo').value;
        
        if(!data || !modelo || !custo) return alert("Preencha os campos!");
        const dataFormat = data.split('-').reverse().join('/');

        db.collection("pecas").add({
            data: dataFormat, modelo, fornecedor, custo: parseFloat(custo)
        }).then(() => {
            document.getElementById('add-form').classList.add('hidden');
        });
    }

    function loadUsers() {
        db.collection("usuarios").onSnapshot(snap => {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const u = doc.data();
                tbody.innerHTML += `
                    <tr>
                        <td>${u.nome}</td>
                        <td>${u.telefone}</td>
                        <td>${u.email}</td>
                        <td>${u.autorizado ? '✅ Ativo' : '⏳ Pendente'}</td>
                        <td>
                            <button class="btn-main" style="padding:5px; font-size:10px" onclick="toggleUserStatus('${doc.id}', ${!u.autorizado})">
                                ${u.autorizado ? 'Desativar' : 'Autorizar'}
                            </button>
                        </td>
                    </tr>`;
            });
        });
    }

    function toggleUserStatus(id, status) {
        db.collection("usuarios").doc(id).update({ autorizado: status });
    }

    function loadHistory() {
        db.collection("historico").orderBy("data", "desc").limit(50).onSnapshot(snap => {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const h = doc.data();
                tbody.innerHTML += `<tr><td>${h.data}</td><td>${h.usuario}</td><td>${h.email}</td></tr>`;
            });
        });
    }

    function deletePiece(id) {
        if(confirm("Deseja excluir?")) db.collection("pecas").doc(id).delete();
    }

    function toggleForm() { document.getElementById('add-form').classList.toggle('hidden'); }

    function filterTable() {
        const val = document.getElementById('searchInput').value.toUpperCase();
        const rows = document.getElementById('tableBody').getElementsByTagName('tr');
        for (let r of rows) {
            r.style.display = r.innerText.toUpperCase().includes(val) ? "" : "none";
        }
    }

    function importExcel(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type:'array'});
            const sheet = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
            sheet.slice(1).forEach(row => {
                if(row[1]) {
                    db.collection("pecas").add({
                        data: new Date().toLocaleDateString('pt-BR'),
                        modelo: String(row[1]).toUpperCase(),
                        custo: parseFloat(row[2]) || 0,
                        fornecedor: String(row[3] || 'IMPORTADO').toUpperCase()
                    });
                }
            });
            alert("Importação concluída!");
        };
        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
