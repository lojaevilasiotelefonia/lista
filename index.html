<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evilasio Telefonia - Gestão Profissional</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --primary: #1e3a8a; --accent: #3b82f6; --success: #10b981; 
            --danger: #ef4444; --warning: #f59e0b; --dark: #0f172a; --light: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding-bottom: 80px; color: var(--dark); }
        .hidden { display: none !important; }

        #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 35px; border-radius: 16px; width: 350px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }

        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; overflow-x: auto; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; background: #e2e8f0; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: 600; padding: 12px 18px; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .search-box { font-size: 16px; border: 2px solid var(--accent); margin-bottom: 20px; }

        .peca-card { background: white; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s; }
        .peca-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card-label { color: #64748b; font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        .modelo-title { font-size: 20px; color: var(--primary); margin: 5px 0 15px 0; display: block; font-weight: 800; line-height: 1.2; }
        
        .price-container { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 15px; border-radius: 10px; border-left: 4px solid var(--accent); }
        .price-val { font-size: 18px; font-weight: 800; display: block; }

        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 10px; border-top: 1px solid #f1f5f9; }
        .date-info { font-size: 12px; color: #94a3b8; font-weight: 500; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; color: white; font-weight: 700; }
        .bg-7d { background: var(--success); }
        .bg-15d { background: var(--warning); }
        .bg-30d { background: var(--danger); }
        .alert-box { background: #fff1f2; border: 1px solid #fda4af; color: #e11d48; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 12px; font-weight: 700; text-align: center; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 12px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 0.8em; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 id="auth-title" style="color: var(--primary); margin-bottom: 5px;">Evilasio Telefonia</h2>
        <p style="font-size: 12px; color: #64748b; margin-bottom: 20px;">Gestão de Peças e Cotações</p>
        <input type="text" id="user-name" class="hidden" placeholder="Nome Completo">
        <input type="tel" id="user-phone" class="hidden" placeholder="WhatsApp">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button class="btn-main" style="width:100%" onclick="handleAuth()" id="btn-auth">Entrar</button>
        <div style="margin-top: 15px; font-size: 13px;">
            <span id="btn-switch" style="color: var(--accent); cursor:pointer; font-weight: bold;" onclick="toggleAuthMode()">Criar conta</span>
        </div>
        <p id="login-error" style="color:var(--danger); font-size: 11px; margin-top: 10px;"></p>
    </div>
</div>

<div id="app" class="hidden">
    <div class="container">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <h2 style="margin:0; color: var(--primary)">Painel de Controle</h2>
                <small>Olá, <span id="display-name" style="font-weight: bold;">...</span></small>
            </div>
            <button onclick="logout()" class="btn-outline" style="padding: 5px 15px; font-size: 12px; color: var(--danger); border-color: var(--danger)">Sair</button>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('estoque')">📦 Estoque</button>
            <button id="tab-users" class="tab-btn hidden" onclick="switchTab('usuarios')">👥 Usuários</button>
            <button id="tab-history" class="tab-btn hidden" onclick="switchTab('historico')">📜 Histórico</button>
        </div>

        <div id="content-estoque" class="tab-content">
            <input type="text" id="searchInput" class="search-box" placeholder="🔎 Digite o modelo da peça..." onkeyup="filterCards()">
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
                <button class="btn-main" style="background:var(--success); flex: 1;" onclick="toggleForm()">+ Cadastrar</button>
                <button class="btn-main" style="background:#8b5cf6; flex: 1;" onclick="document.getElementById('importFile').click()">📥 Importar Excel</button>
                <input type="file" id="importFile" class="hidden" accept=".xlsx, .xls" onchange="importExcel(event)">
            </div>
            
            <button id="btn-limpar-tudo" class="btn-danger hidden" style="width: 100%; margin-bottom: 20px; padding: 8px;" onclick="limparBancoDados()">🔥 LIMPAR TODO O ESTOQUE</button>

            <div id="add-form" class="hidden" style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #cbd5e1;">
                <h4 style="margin-top:0">Nova Peça</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="date" id="new-data">
                    <input type="number" id="new-custo" placeholder="Custo R$">
                    <input type="text" id="new-modelo" style="grid-column: span 2;" placeholder="Modelo (Ex: TELA REDMI NOTE 11)">
                    <button class="btn-main" style="grid-column: span 2;" onclick="savePiece()">Salvar no Sistema</button>
                </div>
            </div>

            <div id="cardsContainer">Carregando estoque...</div>
        </div>

        <div id="content-usuarios" class="tab-content hidden">
            <h3>Autorizações</h3>
            <table style="background: white; border-radius: 8px;">
                <tbody id="userTableBody"></tbody>
            </table>
        </div>

        <div id="content-historico" class="tab-content hidden">
            <h3>Acessos Recentes</h3>
            <table style="background: white; border-radius: 8px;">
                <tbody id="historyTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<footer>&copy; 2026 Evilasio Telefonia | Fabio Oliveira</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3pXWX8z0d2B4Ydaz8V4BfkUOwTTB3a6s",
        authDomain: "consulta-pecas-88bef.firebaseapp.com",
        projectId: "consulta-pecas-88bef",
        storageBucket: "consulta-pecas-88bef.firebasestorage.app",
        messagingSenderId: "947197799357",
        appId: "1:947197799357:web:5276e85aea7ae93d5400d4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const ADM_EMAIL = "tvfmrp@gmail.com";

    // --- AUTENTICAÇÃO ---
    function toggleAuthMode() {
        const isLogin = document.getElementById('user-name').classList.contains('hidden');
        document.getElementById('auth-title').innerText = isLogin ? "Nova Conta" : "Evilasio Telefonia";
        document.getElementById('user-name').classList.toggle('hidden');
        document.getElementById('user-phone').classList.toggle('hidden');
        document.getElementById('btn-auth').innerText = isLogin ? "Criar Conta" : "Entrar";
    }

    function handleAuth() {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        const isLogin = document.getElementById('user-name').classList.contains('hidden');

        if (isLogin) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Erro: " + e.message));
        } else {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            auth.createUserWithEmailAndPassword(email, pass).then(u => {
                db.collection("usuarios").doc(u.user.uid).set({
                    nome: name, telefone: phone, email: email, autorizado: (email.toLowerCase() === ADM_EMAIL.toLowerCase())
                });
                alert("Cadastro feito! Peça ao ADM para autorizar seu acesso.");
            }).catch(e => alert(e.message));
        }
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            db.collection("usuarios").doc(user.uid).get().then(doc => {
                const userData = doc.data();
                const isAdm = user.email.toLowerCase() === ADM_EMAIL.toLowerCase();

                if(!userData?.autorizado && !isAdm) {
                    alert("Acesso pendente. Fale com o administrador.");
                    auth.signOut();
                    return;
                }
                
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('display-name').innerText = userData?.nome || "Admin";

                if(isAdm) {
                    document.getElementById('tab-users').classList.remove('hidden');
                    document.getElementById('tab-history').classList.remove('hidden');
                    document.getElementById('btn-limpar-tudo').classList.remove('hidden');
                    loadUsers();
                    loadHistory();
                }
                loadData();
            });
        }
    });

    // --- GESTÃO DE DADOS ---
    function loadData() {
        // Ordenamos por 'createdAt' para que itens novos apareçam primeiro, independente da 'data' escrita
        db.collection("pecas").orderBy("createdAt", "desc").onSnapshot(snap => {
            const container = document.getElementById('cardsContainer');
            if (snap.empty) {
                container.innerHTML = "<p style='text-align:center; padding:20px;'>Nenhum item no estoque.</p>";
                return;
            }
            
            container.innerHTML = '';
            snap.forEach(doc => {
                const item = doc.data();
                // Cálculo de dias para o alerta de preço
                const dataSplit = item.data.split('/');
                const dataFormatada = dataSplit.length === 3 ? `${dataSplit[2]}-${dataSplit[1]}-${dataSplit[0]}` : item.data;
                const dias = Math.floor((new Date() - new Date(dataFormatada)) / 86400000) || 0;
                
                const badgeClass = dias >= 30 ? 'bg-30d' : (dias >= 15 ? 'bg-15d' : 'bg-7d');
                const custo = parseFloat(item.custo) || 0;
                
                container.innerHTML += `
                    <div class="peca-card">
                        <span class="card-label">Modelo da Peça</span>
                        <span class="modelo-title">${item.modelo}</span>

                        <div class="price-container">
                            <div>
                                <span class="card-label">Custo</span>
                                <span class="price-val" style="color:var(--danger)">R$ ${custo.toFixed(2)}</span>
                            </div>
                            <div style="text-align:right">
                                <span class="card-label">Sugestão de Venda</span>
                                <span class="price-val" style="color:var(--success)">R$ ${(custo*2.5).toFixed(2)} - R$ ${(custo*3).toFixed(2)}</span>
                            </div>
                        </div>

                        ${dias > 15 ? `<div class="alert-box">⚠️ Preço registrado há ${dias} dias. Pode estar desatualizado!</div>` : ''}

                        <div class="card-footer">
                            <span class="date-info">Entrada: ${item.data} <span class="badge ${badgeClass}">${dias} dias atrás</span></span>
                            <button onclick="deletePiece('${doc.id}')" style="background:none; color:var(--danger); font-size:11px; text-decoration:underline">Excluir</button>
                        </div>
                    </div>`;
            });
        }, err => {
            console.error("Erro Firestore:", err);
            if(err.message.includes("index")) {
                document.getElementById('cardsContainer').innerHTML = "<p style='color:red'>Erro: Você precisa criar um Índice no Console do Firebase para ordenar os dados.</p>";
            }
        });
    }

    async function importExcel(e) {
        const file = e.target.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
            try {
                const data = new Uint8Array(evt.target.result);
                const wb = XLSX.read(data, {type:'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
                
                const batch = db.batch();
                let count = 0;

                // Começa do 1 para pular o cabeçalho
                rows.slice(1).forEach(row => {
                    if(row[1]) { // Se houver modelo
                        const docRef = db.collection("pecas").doc();
                        batch.set(docRef, {
                            data: row[0] || new Date().toLocaleDateString('pt-BR'),
                            modelo: String(row[1]).toUpperCase().trim(),
                            custo: parseFloat(String(row[2]).replace('R$', '').replace(',', '.')) || 0,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        count++;
                    }
                });

                if(count > 0) {
                    await batch.commit();
                    alert(count + " itens importados com sucesso!");
                } else {
                    alert("Nenhum dado válido encontrado na planilha.");
                }
            } catch (err) {
                console.error(err);
                alert("Erro ao processar Excel. Verifique as colunas.");
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function savePiece() {
        const d = document.getElementById('new-data').value;
        const m = document.getElementById('new-modelo').value.toUpperCase().trim();
        const c = document.getElementById('new-custo').value;
        
        if(!d || !m || !c) return alert("Preencha todos os campos!");

        db.collection("pecas").add({
            data: d.split('-').reverse().join('/'),
            modelo: m,
            custo: parseFloat(c),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            toggleForm();
            document.getElementById('new-modelo').value = "";
            document.getElementById('new-custo').value = "";
        });
    }

    // --- UTILITÁRIOS ---
    async function limparBancoDados() {
        if(auth.currentUser.email !== ADM_EMAIL) return;
        if (confirm("ISSO APAGARÁ TODO O ESTOQUE. Tem certeza?")) {
            const senha = prompt("Digite 'APAGAR' para confirmar:");
            if (senha === "APAGAR") {
                const snap = await db.collection("pecas").get();
                const batch = db.batch();
                snap.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                alert("Estoque limpo!");
            }
        }
    }

    function deletePiece(id) {
        if(confirm("Deseja apagar esta peça?")) {
            db.collection("pecas").doc(id).delete();
        }
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('content-'+t).classList.remove('hidden');
        event.currentTarget.classList.add('active');
    }

    function toggleForm() { document.getElementById('add-form').classList.toggle('hidden'); }

    function filterCards() {
        const v = document.getElementById('searchInput').value.toUpperCase();
        const cards = document.getElementsByClassName('peca-card');
        for (let c of cards) {
            c.style.display = c.innerText.toUpperCase().includes(v) ? "" : "none";
        }
    }

    function loadUsers() {
        db.collection("usuarios").onSnapshot(snap => {
            const tb = document.getElementById('userTableBody');
            tb.innerHTML = '';
            snap.forEach(doc => {
                const u = doc.data();
                tb.innerHTML += `<tr><td><b>${u.nome}</b><br>${u.email}</td><td>${u.autorizado?'✅':'⏳'}</td><td><button onclick="db.collection('usuarios').doc('${doc.id}').update({autorizado:${!u.autorizado}})">Alternar</button></td></tr>`;
            });
        });
    }

    function loadHistory() {
        db.collection("historico").orderBy("data", "desc").limit(10).onSnapshot(snap => {
            const tb = document.getElementById('historyTableBody');
            tb.innerHTML = '';
            snap.forEach(doc => {
                const h = doc.data();
                tb.innerHTML += `<tr><td>${h.data}</td><td>${h.usuario}</td></tr>`;
            });
        });
    }
</script>
</body>
</html>
