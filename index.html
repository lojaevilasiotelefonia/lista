<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evilasio Telefonia- Gestão de Peças</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #3498db; --success: #27ae60; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 60px; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        #login-screen { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 8px; width: 320px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        
        button { cursor: pointer; border: none; border-radius: 4px; transition: 0.3s; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 12px; margin-top: 10px; }
        .btn-secondary { background: transparent; color: var(--primary); width: 100%; padding: 8px; margin-top: 5px; text-decoration: underline; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .user-info { font-size: 0.9em; color: var(--dark); }
        .search-box { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #eee; border-radius: 8px; margin-bottom: 15px; }
        
        .actions { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-add { background: var(--success); color: white; padding: 10px 20px; }
        .btn-import { background: #9b59b6; color: white; padding: 10px 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .sugestao { background: #e8f4fd; padding: 8px; border-radius: 4px; font-size: 0.9em; border-left: 4px solid var(--primary); }
        .price { font-weight: bold; color: var(--success); }

        footer { position: fixed; bottom: 0; width: 100%; background: var(--dark); color: white; text-align: center; padding: 10px 0; font-size: 0.8em; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h3 id="auth-title">Entrar no Sistema</h3>
        <input type="text" id="user-name" class="hidden" placeholder="Seu Nome Completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button class="btn-main" id="btn-auth" onclick="handleAuth()">Entrar</button>
        <button class="btn-secondary" id="btn-switch" onclick="toggleAuthMode()">Não tem conta? Registre-se</button>
        <p id="login-error" style="color:red; font-size: 12px; margin-top:10px"></p>
    </div>
</div>

<div id="app" class="hidden">
    <div class="container">
        <div class="header">
            <div>
                <h2 style="margin:0">Evilasio Telefonia</h2>
                <span class="user-info">Olá, <strong id="display-name">Carregando...</strong></span>
            </div>
            <button onclick="logout()" style="background: #e74c3c; color: white; padding: 8px 15px;">Sair</button>
        </div>

        <div class="actions">
            <input type="text" id="searchInput" class="search-box" style="flex:1" placeholder="🔎 Buscar modelo..." onkeyup="filterTable()">
            <button class="btn-add" onclick="toggleForm()">+ Peça</button>
            <button class="btn-import" onclick="document.getElementById('importFile').click()">📥 Importar Excel</button>
            <input type="file" id="importFile" class="hidden" accept=".xlsx, .xls, .csv" onchange="importExcel(event)">
        </div>

        <div id="add-form" class="hidden" style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd;">
            <div style="display: grid; grid-template-columns: 1fr 2fr 1fr 1fr; gap: 10px;">
                <input type="date" id="new-data">
                <input type="text" id="new-modelo" placeholder="Modelo">
                <input type="number" id="new-custo" placeholder="Custo">
                <button onclick="savePiece()" style="background: var(--success); color: white;">Salvar</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Modelo</th>
                    <th>Custo</th>
                    <th>Sugestão de Venda</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<footer>Desenvolvido por Fabio Oliveira 2026</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3pXWX8z0d2B4Ydaz8V4BfkUOwTTB3a6s",
        authDomain: "consulta-pecas-88bef.firebaseapp.com",
        projectId: "consulta-pecas-88bef",
        storageBucket: "consulta-pecas-88bef.firebasestorage.app",
        messagingSenderId: "947197799357",
        appId: "1:947197799357:web:5276e85aea7ae93d5400d4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let isLoginMode = true;

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Entrar no Sistema" : "Criar Nova Conta";
        document.getElementById('user-name').classList.toggle('hidden', isLoginMode);
        document.getElementById('btn-auth').innerText = isLoginMode ? "Entrar" : "Registrar Agora";
        document.getElementById('btn-switch').innerText = isLoginMode ? "Voltar para Login" : "Não tem conta? Registre-se";
    }

    function handleAuth() {
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('login-error');

        if (isLoginMode) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => errorDiv.innerText = e.message);
        } else {
            if(!name) return alert("Por favor, digite seu nome!");
            auth.createUserWithEmailAndPassword(email, pass)
                .then(userCred => {
                    db.collection("usuarios").doc(userCred.user.uid).set({
                        nome: name,
                        email: email,
                        autorizado: true 
                    });
                })
                .catch(e => errorDiv.innerText = e.message);
        }
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            db.collection("usuarios").doc(user.uid).get().then(doc => {
                // CORREÇÃO DO NOME: Se não achar o nome, usa o email antes do @
                const nomeUsuario = doc.exists ? doc.data().nome : user.email.split('@')[0];
                document.getElementById('display-name').innerText = nomeUsuario;
                loadData();
            }).catch(() => {
                document.getElementById('display-name').innerText = user.email.split('@')[0];
                loadData();
            });
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }
    });

    function loadData() {
        db.collection("pecas").orderBy("data", "desc").onSnapshot(snap => {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const item = doc.data();
                const sug1 = (item.custo * 2.5).toLocaleString('pt-br', {style:'currency', currency:'BRL'});
                const sug2 = (item.custo * 3.0).toLocaleString('pt-br', {style:'currency', currency:'BRL'});
                tbody.innerHTML += `
                    <tr>
                        <td>${item.data}</td>
                        <td><strong>${item.modelo}</strong></td>
                        <td>R$ ${parseFloat(item.custo).toFixed(2)}</td>
                        <td><div class="sugestao">Venda: <span class="price">${sug1}</span> a <span class="price">${sug2}</span></div></td>
                    </tr>`;
            });
        });
    }

    // FUNÇÃO PARA IMPORTAR EXCEL
    function importExcel(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

            // Pula a primeira linha (cabeçalho) e processa o resto
            let count = 0;
            jsonData.slice(1).forEach(row => {
                if (row[0] && row[1] && row[2]) {
                    db.collection("pecas").add({
                        data: String(row[0]), // Data
                        modelo: String(row[1]).toUpperCase(), // Modelo
                        custo: parseFloat(row[2]) // Custo
                    });
                    count++;
                }
            });
            alert(count + " registros importados com sucesso!");
            event.target.value = ''; // Limpa o campo de arquivo
        };
        reader.readAsArrayBuffer(file);
    }

    function savePiece() {
        const data = document.getElementById('new-data').value;
        const modelo = document.getElementById('new-modelo').value.toUpperCase();
        const custo = parseFloat(document.getElementById('new-custo').value);
        if(!data || !modelo || !custo) return alert("Preencha tudo!");
        
        db.collection("pecas").add({ data, modelo, custo }).then(() => {
            toggleForm();
            document.getElementById('new-modelo').value = '';
            document.getElementById('new-custo').value = '';
        });
    }

    function toggleForm() { document.getElementById('add-form').classList.toggle('hidden'); }

    function filterTable() {
        const val = document.getElementById('searchInput').value.toUpperCase();
        const rows = document.getElementById('tableBody').getElementsByTagName('tr');
        for (let r of rows) {
            r.style.display = r.cells[1].innerText.toUpperCase().includes(val) ? "" : "none";
        }
    }
</script>
</body>
</html>
