<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evilasio Telefonia - Gestão de Peças</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #3498db; --success: #27ae60; --dark: #2c3e50; --whatsapp: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 60px; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        #login-screen { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 8px; width: 320px; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        
        button { cursor: pointer; border: none; border-radius: 4px; transition: 0.3s; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 12px; margin-top: 10px; }
        .btn-secondary { background: transparent; color: var(--primary); width: 100%; padding: 8px; margin-top: 5px; text-decoration: underline; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .user-info { font-size: 0.9em; color: var(--dark); }
        .search-box { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #eee; border-radius: 8px; margin-bottom: 15px; }
        
        .actions { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-add { background: var(--success); color: white; padding: 10px 20px; }
        .btn-import { background: #9b59b6; color: white; padding: 10px 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .sugestao { background: #e8f4fd; padding: 8px; border-radius: 4px; font-size: 0.9em; border-left: 4px solid var(--primary); margin-bottom: 5px; }
        .price { font-weight: bold; color: var(--success); }
        
        #cotacao-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 450px; }

        footer { position: fixed; bottom: 0; width: 100%; background: var(--dark); color: white; text-align: center; padding: 10px 0; font-size: 0.8em; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h3 id="auth-title">Entrar no Sistema</h3>
        <input type="text" id="user-name" class="hidden" placeholder="Nome Completo">
        <input type="tel" id="user-phone" class="hidden" placeholder="WhatsApp (Ex: 5527999998888)">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button class="btn-main" id="btn-auth" onclick="handleAuth()">Entrar</button>
        <button class="btn-secondary" id="btn-switch" onclick="toggleAuthMode()">Não tem conta? Registre-se</button>
        <p id="login-error" style="color:red; font-size: 12px; margin-top:10px"></p>
    </div>
</div>

<div id="app" class="hidden">
    <div class="container">
        <div class="header">
            <div>
                <h2 style="margin:0">Evilasio Telefonia</h2>
                <span class="user-info">Olá, <strong id="display-name">Carregando...</strong></span>
            </div>
            <button onclick="logout()" style="background: #e74c3c; color: white; padding: 8px 15px;">Sair</button>
        </div>

        <div class="actions">
            <input type="text" id="searchInput" class="search-box" style="flex:1" placeholder="🔎 Buscar modelo..." onkeyup="filterTable()">
            <button class="btn-add" onclick="toggleForm()">+ Peça</button>
            <button class="btn-import" onclick="document.getElementById('importFile').click()">📥 Importar Excel</button>
            <input type="file" id="importFile" class="hidden" accept=".xlsx, .xls, .csv" onchange="importExcel(event)">
        </div>

        <div id="add-form" class="hidden" style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd;">
            <div style="display: grid; grid-template-columns: 1fr 2fr 1fr 1fr; gap: 10px;">
                <input type="date" id="new-data">
                <input type="text" id="new-modelo" placeholder="Modelo">
                <input type="number" id="new-custo" placeholder="Custo">
                <button onclick="savePiece()" style="background: var(--success); color: white;">Salvar</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Modelo</th>
                    <th>Custo</th>
                    <th>Sugestão e Cotação</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="cotacao-modal" class="hidden">
    <div class="modal-content">
        <h3 style="margin-top:0; color: var(--dark)">Nova Cotação</h3>
        <input type="text" id="cot-peca" placeholder="Cotação de (Ex: Tela, Conector)*">
        <input type="text" id="cot-marca" placeholder="Marca (Ex: Samsung)*">
        <input type="text" id="cot-modelo" readonly style="background:#eee" placeholder="Modelo">
        <input type="text" id="cot-ref" placeholder="REF (Opcional)">
        <input type="text" id="cot-cor" placeholder="COR (Opcional)">
        <input type="text" id="cot-cliente" placeholder="Nome do Cliente*">
        
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="gerarMensagemFinal()" style="background: #25d366; color:white; flex:1; padding:12px;">Gerar WhatsApp</button>
            <button onclick="fecharModal()" style="background: #ccc; flex:1; padding:12px;">Cancelar</button>
        </div>
    </div>
</div>

<footer>Desenvolvido por Fabio Oliveira 2026</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3pXWX8z0d2B4Ydaz8V4BfkUOwTTB3a6s",
        authDomain: "consulta-pecas-88bef.firebaseapp.com",
        projectId: "consulta-pecas-88bef",
        storageBucket: "consulta-pecas-88bef.firebasestorage.app",
        messagingSenderId: "947197799357",
        appId: "1:947197799357:web:5276e85aea7ae93d5400d4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let isLoginMode = true;
    let userPhone = ""; 

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Entrar no Sistema" : "Criar Nova Conta";
        document.getElementById('user-name').classList.toggle('hidden', isLoginMode);
        document.getElementById('user-phone').classList.toggle('hidden', isLoginMode);
        document.getElementById('btn-auth').innerText = isLoginMode ? "Entrar" : "Registrar Agora";
        document.getElementById('btn-switch').innerText = isLoginMode ? "Não tem conta? Registre-se" : "Voltar para Login";
    }

    function handleAuth() {
        const name = document.getElementById('user-name').value;
        const phone = document.getElementById('user-phone').value;
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('login-error');

        if (isLoginMode) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => errorDiv.innerText = e.message);
        } else {
            if(!name || !phone) return alert("Por favor, preencha nome e telefone!");
            auth.createUserWithEmailAndPassword(email, pass)
                .then(userCred => {
                    db.collection("usuarios").doc(userCred.user.uid).set({
                        nome: name,
                        telefone: phone,
                        email: email,
                        autorizado: true 
                    });
                })
                .catch(e => errorDiv.innerText = e.message);
        }
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            db.collection("usuarios").doc(user.uid).get().then(doc => {
                const userData = doc.data();
                document.getElementById('display-name').innerText = doc.exists ? userData.nome : user.email.split('@')[0];
                userPhone = doc.exists ? userData.telefone : ""; 
                loadData();
            });
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }
    });

    function loadData() {
        db.collection("pecas").orderBy("data", "desc").onSnapshot(snap => {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const item = doc.data();
                const sug1 = (item.custo * 2.5).toLocaleString('pt-br', {style:'currency', currency:'BRL'});
                const sug2 = (item.custo * 3.0).toLocaleString('pt-br', {style:'currency', currency:'BRL'});
                
                tbody.innerHTML += `
                    <tr>
                        <td>${item.data}</td>
                        <td><strong>${item.modelo}</strong></td>
                        <td>R$ ${parseFloat(item.custo).toFixed(2)}</td>
                        <td>
                            <div class="sugestao">Venda: <span class="price">${sug1}</span> a <span class="price">${sug2}</span></div>
                            <button onclick="abrirFormularioCotacao('${item.modelo}')" 
                                    style="background:var(--whatsapp); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer">
                                📝 Cotar Peça
                            </button>
                        </td>
                    </tr>`;
            });
        });
    }

    function abrirFormularioCotacao(modelo) {
        document.getElementById('cot-modelo').value = modelo;
        document.getElementById('cotacao-modal').classList.remove('hidden');
    }

    function fecharModal() {
        document.getElementById('cotacao-modal').classList.add('hidden');
    }

    function gerarMensagemFinal() {
        const peca = document.getElementById('cot-peca').value;
        const marca = document.getElementById('cot-marca').value;
        const modelo = document.getElementById('cot-modelo').value;
        const ref = document.getElementById('cot-ref').value || "Não informada";
        const cor = document.getElementById('cot-cor').value || "Não informada";
        const cliente = document.getElementById('cot-cliente').value;

        if(!peca || !marca || !cliente) return alert("Por favor, preencha os campos obrigatórios (*)");
        if(!userPhone) return alert("Seu telefone não foi encontrado no cadastro!");

        const mensagem = `Cotação de ${peca}, por favor:\n` +
                         `Marca: ${marca}\n` +
                         `Modelo: ${modelo}\n` +
                         `REF: ${ref} opcional\n` +
                         `COR: ${cor} opcional\n` +
                         `Cliente: ${cliente}\n\n` +
                         `*FAVOR COTAR SOMENTE SE TIVER EM ESTOQUE, NOVA E FUNCIONANDO, POR FAVOR*`;

        const foneLimpo = userPhone.replace(/\D/g, ''); 
        const url = `https://web.whatsapp.com/send?phone=${foneLimpo}&text=${encodeURIComponent(mensagem)}`;
        
        window.open(url, '_blank');
        fecharModal();
    }
function converterDataExcel(valor) {
    // Verifica se o valor é um número (como 44595 do Excel)
    if (typeof valor === "number" || (!isNaN(valor) && !String(valor).includes('/'))) {
        // A fórmula matemática para transformar os dias do Excel em Data do JavaScript (usando UTC para evitar fuso horário)
        const dataJS = new Date(Math.round((Number(valor) - 25569) * 86400 * 1000));
        const dia = String(dataJS.getUTCDate()).padStart(2, '0');
        const mes = String(dataJS.getUTCMonth() + 1).padStart(2, '0');
        const ano = dataJS.getUTCFullYear();
        return `${dia}/${mes}/${ano}`; // Retorna prontinho: DD/MM/AAAA
    }
    
    // Se por acaso já for uma data em texto (ex: "30/01/2026"), apenas retorna ela mesma
    return String(valor);
}
    function importExcel(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
        let count = 0;
        
        jsonData.slice(1).forEach(row => {
            if (row[0] && row[1] && row[2]) {
                db.collection("pecas").add({
                    data: converterDataExcel(row[0]), // <--- A MUDANÇA ESTÁ AQUI
                    modelo: String(row[1]).toUpperCase(),
                    custo: parseFloat(row[2])
                });
                count++;
            }
        });
        
        alert(count + " registros importados!");
        event.target.value = '';
    };
    reader.readAsArrayBuffer(file);
}

    function savePiece() {
        const data = document.getElementById('new-data').value;
        const modelo = document.getElementById('new-modelo').value.toUpperCase();
        const custo = parseFloat(document.getElementById('new-custo').value);
        if(!data || !modelo || !custo) return alert("Preencha tudo!");
        db.collection("pecas").add({ data, modelo, custo }).then(() => {
            toggleForm();
            document.getElementById('new-modelo').value = '';
            document.getElementById('new-custo').value = '';
        });
    }

    function toggleForm() { document.getElementById('add-form').classList.toggle('hidden'); }

    function filterTable() {
        const val = document.getElementById('searchInput').value.toUpperCase();
        const rows = document.getElementById('tableBody').getElementsByTagName('tr');
        for (let r of rows) {
            r.style.display = r.cells[1].innerText.toUpperCase().includes(val) ? "" : "none";
        }
    }
</script>
</body>
</html>
