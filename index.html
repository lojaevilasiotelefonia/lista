<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evilasio Telefonia - Gestão Profissional</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --primary: #1e3a8a; --accent: #3b82f6; --success: #10b981; 
            --danger: #ef4444; --warning: #f59e0b; --dark: #0f172a; --light: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding-bottom: 80px; color: var(--dark); }
        .hidden { display: none !important; }
        #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 35px; border-radius: 16px; width: 350px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; overflow-x: auto; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; background: #e2e8f0; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: 600; padding: 12px 18px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .search-box { font-size: 16px; border: 2px solid var(--accent); margin-bottom: 20px; width: 100%; padding: 12px; border-radius: 8px; }
        .peca-card { background: white; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .modelo-title { font-size: 20px; color: var(--primary); font-weight: 800; display: block; margin-bottom: 10px; }
        .price-container { display: flex; justify-content: space-between; background: #f8fafc; padding: 15px; border-radius: 10px; }
        .price-val { font-size: 18px; font-weight: 800; }
        .alert-box { background: #fff1f2; color: #e11d48; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 10px; text-align: center; font-weight: bold; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; color: white; }
        .bg-7d { background: var(--success); } .bg-15d { background: var(--warning); } .bg-30d { background: var(--danger); }
        footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 0.8em; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 id="auth-title">Evilasio Telefonia</h2>
        <input type="text" id="user-name" class="hidden" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button class="btn-main" style="width:100%" onclick="handleAuth()" id="btn-auth">Entrar</button>
        <p onclick="toggleAuthMode()" style="color:var(--accent); cursor:pointer; font-size:13px; margin-top:10px;">Criar conta</p>
    </div>
</div>

<div id="app" class="hidden">
    <div class="container">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: var(--primary)">Estoque</h2>
            <button onclick="logout()" class="btn-danger" style="padding: 5px 10px; font-size: 12px;">Sair</button>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('estoque')">📦 Estoque</button>
            <button id="tab-users" class="tab-btn hidden" onclick="switchTab('usuarios')">👥 Usuários</button>
        </div>

        <div id="content-estoque">
            <input type="text" id="searchInput" class="search-box" placeholder="🔎 Pesquisar modelo..." onkeyup="filterCards()">
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="btn-main" onclick="toggleForm()" style="background:var(--success); flex:1">+ Novo</button>
                <button class="btn-main" onclick="document.getElementById('importFile').click()" style="background:#8b5cf6; flex:1">📥 Importar Excel</button>
                <input type="file" id="importFile" class="hidden" accept=".xlsx, .xls" onchange="importExcel(event)">
            </div>

            <div id="add-form" class="hidden" style="background:#f1f5f9; padding:15px; border-radius:10px; margin-bottom:15px;">
                <input type="date" id="new-data">
                <input type="text" id="new-modelo" placeholder="Modelo">
                <input type="number" id="new-custo" placeholder="Custo R$">
                <button class="btn-main" onclick="savePiece()" style="width:100%">Salvar</button>
            </div>

            <div id="cardsContainer">Carregando itens...</div>
        </div>

        <div id="content-usuarios" class="tab-content hidden">
            <h3>Usuários</h3>
            <div id="userList"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3pXWX8z0d2B4Ydaz8V4BfkUOwTTB3a6s",
        authDomain: "consulta-pecas-88bef.firebaseapp.com",
        projectId: "consulta-pecas-88bef",
        storageBucket: "consulta-pecas-88bef.firebasestorage.app",
        messagingSenderId: "947197799357",
        appId: "1:947197799357:web:5276e85aea7ae93d5400d4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const ADM_EMAIL = "tvfmrp@gmail.com";

    // --- SEGURANÇA CONTRA ERROS DE DATA ---
    function parseAnyDate(dateVal) {
        if (!dateVal) return new Date();
        // Se for objeto do Firebase (Timestamp)
        if (dateVal.seconds) return dateVal.toDate();
        // Se já for objeto Date
        if (dateVal instanceof Date) return dateVal;
        
        let s = String(dateVal);
        if (s.includes('/')) {
            const [d, m, y] = s.split('/');
            return new Date(`${y}-${m}-${d}`);
        }
        return new Date(s);
    }

    // --- FUNÇÕES DE INTERFACE ---
    function toggleAuthMode() {
        document.getElementById('user-name').classList.toggle('hidden');
        document.getElementById('btn-auth').innerText = document.getElementById('user-name').classList.contains('hidden') ? "Entrar" : "Criar Conta";
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const name = document.getElementById('user-name').value;
        const isLogin = document.getElementById('user-name').classList.contains('hidden');

        if (isLogin) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Erro: " + e.message));
        } else {
            auth.createUserWithEmailAndPassword(email, pass).then(u => {
                db.collection("usuarios").doc(u.user.uid).set({
                    nome: name, email: email, autorizado: (email.toLowerCase() === ADM_EMAIL)
                });
                alert("Conta criada! Aguarde o ADM liberar.");
            }).catch(e => alert(e.message));
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            db.collection("usuarios").doc(user.uid).get().then(doc => {
                if (!doc.exists && user.email !== ADM_EMAIL) {
                    alert("Usuário não registrado.");
                    auth.signOut(); return;
                }
                const data = doc.data();
                if (data?.autorizado || user.email === ADM_EMAIL) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if (user.email === ADM_EMAIL) document.getElementById('tab-users').classList.remove('hidden');
                    loadData();
                } else {
                    alert("Aguarde autorização."); auth.signOut();
                }
            });
        }
    });

    function loadData() {
        // Ordenação por createdAt para garantir que itens novos apareçam primeiro
        db.collection("pecas").orderBy("createdAt", "desc").onSnapshot(snap => {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = snap.empty ? "Nenhum item." : "";
            
            snap.forEach(doc => {
                const item = doc.data();
                const itemDate = parseAnyDate(item.data);
                const dias = Math.floor((new Date() - itemDate) / 86400000) || 0;
                const badge = dias >= 30 ? 'bg-30d' : (dias >= 15 ? 'bg-15d' : 'bg-7d');
                const custo = parseFloat(item.custo) || 0;

                container.innerHTML += `
                    <div class="peca-card">
                        <span class="modelo-title">${item.modelo || 'SEM NOME'}</span>
                        <div class="price-container">
                            <div><small>CUSTO</small><br><b style="color:red">R$ ${custo.toFixed(2)}</b></div>
                            <div style="text-align:right"><small>VENDA</small><br><b style="color:green">R$ ${(custo*2.5).toFixed(2)}</b></div>
                        </div>
                        ${dias > 15 ? `<div class="alert-box">⚠️ Preço de ${dias} dias atrás. Verifique!</div>` : ''}
                        <div style="margin-top:10px; font-size:12px; display:flex; justify-content:space-between">
                            <span>📅 ${item.data || ''} <span class="badge ${badge}">${dias}d</span></span>
                            <button onclick="deletePiece('${doc.id}')" style="background:none; color:red; cursor:pointer">Excluir</button>
                        </div>
                    </div>`;
            });
        }, err => {
            document.getElementById('cardsContainer').innerHTML = "<b style='color:red'>Erro de Permissão! Vá no console do Firebase e libere as 'Rules'.</b>";
        });
    }

    async function importExcel(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (evt) => {
            const data = new Uint8Array(evt.target.result);
            const wb = XLSX.read(data, {type:'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
            const batch = db.batch();
            
            rows.slice(1).forEach(row => {
                if (row[1]) {
                    const docRef = db.collection("pecas").doc();
                    batch.set(docRef, {
                        data: String(row[0]), // Garante que vira texto
                        modelo: String(row[1]).toUpperCase(),
                        custo: parseFloat(String(row[2]).replace('R$', '').replace(',', '.')) || 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            });
            await batch.commit();
            alert("Importado!");
        };
        reader.readAsArrayBuffer(file);
    }

    function savePiece() {
        const d = document.getElementById('new-data').value;
        const m = document.getElementById('new-modelo').value;
        const c = document.getElementById('new-custo').value;
        db.collection("pecas").add({
            data: d.split('-').reverse().join('/'),
            modelo: m.toUpperCase(),
            custo: parseFloat(c),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => toggleForm());
    }

    function deletePiece(id) { if(confirm("Apagar?")) db.collection("pecas").doc(id).delete(); }
    function logout() { auth.signOut().then(() => location.reload()); }
    function toggleForm() { document.getElementById('add-form').classList.toggle('hidden'); }
    function switchTab(t) {
        document.getElementById('content-estoque').classList.add('hidden');
        document.getElementById('content-usuarios').classList.add('hidden');
        document.getElementById('content-'+t).classList.remove('hidden');
    }
    function filterCards() {
        const v = document.getElementById('searchInput').value.toUpperCase();
        const cards = document.getElementsByClassName('peca-card');
        for (let c of cards) c.style.display = c.innerText.toUpperCase().includes(v) ? "" : "none";
    }
</script>
</body>
</html>
